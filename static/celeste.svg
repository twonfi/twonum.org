<svg
    width="512" height="512"
    viewBox="0 0 512 512"
    xmlns="http://www.w3.org/2000/svg"
>
    <metadata>
        <rdf:RDF
            xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
            xmlns:dc="http://purl.org/dc/elements/1.1/"
        >
            <cc:Work xmlns:cc="http://creativecommons.org/ns#">
                <dc:title>Celeste</dc:title>
                <dc:creator>twonum.org</dc:creator>
                <cc:license rdf:resource="https://creativecommons.org/licenses/by-sa/4.0/" />
            </cc:Work>
      </rdf:RDF>
    </metadata>
    <defs>
        <linearGradient
            id="purple-sky-gradient"
            x1="50%" y1="100%"
            x2="75%" y2="0%"
        >
            <stop offset="0%" stop-color="#190226" />
            <stop offset="80%" stop-color="#30103f" />
            <stop offset="100%" stop-color="#381746" />
        </linearGradient>
        <linearGradient
            id="mount-celeste-gradient"
            x1="50%" y1="0%"
            x2="50%" y2="100%"
        >
            <stop offset="0%" stop-color="#9beff0" />
            <stop offset="60%" stop-color="#af9dcb" />
            <stop offset="100%" stop-color="#9c7fbd" />
        </linearGradient>
        <linearGradient
            id="celeste-hair-gradient"
            x1="50%" y1="0%"
            x2="50%" y2="100%"
        >
            <stop offset="0%" stop-color="#f53c48" />
            <stop offset="35%" stop-color="#c95485" />
            <stop offset="100%" stop-color="#af9dcb" />
        </linearGradient>
        <linearGradient
            id="celeste-eye-iris-outer-gradient"
            x1="50%" y1="0%"
            x2="50%" y2="100%"
        >
            <stop offset="0%" stop-color="#080200" />
            <stop offset="40%" stop-color="#351b41" />
            <stop offset="100%" stop-color="#351b41" />
        </linearGradient>
        <linearGradient
            id="celeste-eye-iris-inner-gradient"
            x1="50%" y1="0%"
            x2="50%" y2="100%"
        >
            <stop offset="0%" stop-color="#af9dcb" />
            <stop offset="55%" stop-color="#b395c9" />
            <stop offset="100%" stop-color="#e5cbe9" />
        </linearGradient>
        <filter
            id="mount-celeste-shadow"
            x="-30%" y="-30%" width="160%" height="160%"
        >
            <feDropShadow
                dx="0" dy="-5"
                stdDeviation="20"
                flood-color="white"
                flood-opacity="50%"
            />
        </filter>
        <filter
            id="celeste-shadow"
            x="-30%" y="-30%" width="160%" height="160%"
        >
            <feDropShadow
                dx="0" dy="-5"
                stdDeviation="20"
                flood-opacity="40%"
            />
        </filter>
        <filter
            id="blue-wave-shadow"
            x="-30%" y="-30%" width="160%" height="160%"
        >
            <feDropShadow
                dx="0" dy="-5"
                stdDeviation="20"
                flood-opacity="50%"
            />
        </filter>
        <filter
            id="orange-wave-shadow"
            x="-30%" y="-30%" width="160%" height="160%"
        >
            <feDropShadow
                dx="0" dy="-5"
                stdDeviation="30"
                flood-opacity="50%"
            />
        </filter>
    </defs>
    <style type="text/css">
        filter {
            color-interpolation-filters: sRGB;
        }
    </style>
    <g id="celeste-avatar">
        <rect
            id="purple-sky"
            x="0" y="0"
            width="512" height="512"
            fill="url(#purple-sky-gradient)"
        />
        <path
            id="mount-celeste"
            d="M 81 228 L 119 205 L 145 185 L 160 161 L 177 136 L 209 119 L 256 20 L 286 77 L 315 110 L 344 128 L 377 228 Z"
            fill="url(#mount-celeste-gradient)"
            filter="url(#mount-celeste-shadow)"
        />
        <path
            id="blue-wave"
            d="M 0 212 C 38 210 86 247 216 186 C 295 149 479 206 512 190 V 512 H 0 Z"
            fill="#87b3b7"
            filter="url(#blue-wave-shadow)"
        />
        <g id="celeste" filter="url(#celeste-shadow)">
            <path
                id="celeste-hair"
                d="M 246 215 C 204 215 142 260 191 358 H 303 C 338 311 325 215 246 215 Z M 175 273 L 180 300 L 320 351 L 321 307 Z"
                fill="url(#celeste-hair-gradient)"
            />
            <path
                id="celeste-face"
                d="M 196 260 Q 200 253 205 253 H 286 Q 296 253 299 259 C 315 286 307 337 304 347 H 196 C 188 320 181 283 196 260 Z"
                fill="#f4e1dd"
            />  
            <g id="celeste-eyes">
                <!-- I know absolutely nothing about eyes, so here I go... -->
                <symbol id="celeste-eye">
                    <ellipse
                        id="celeste-eye-black-part"
                        cx="16" cy="26"
                        rx="14" ry="16"
                        fill="#0a0400"
                    />
                    <path
                        id="celeste-eye-iris-outer"
                        d="M 5 28 C 5 36 9 40 16 40 C 23 40 28 35 28 30 Q 29 25 25 28 C 19 31 20 32 16 32 C 11 31 12 31 9 29 Q 5 25 5 28 Z"
                        fill="url(#celeste-eye-iris-outer-gradient)"
                    />
                    <path
                        id="celeste-eye-iris-inner"
                        d="M 12 31 C 11 31 9 34 9 35 C 9 38 11 40 15 40 C 20 40 23 39 23 35 C 23 33 21 31 20 31 C 18 32 14 32 12 31 Z"
                        fill="url(#celeste-eye-iris-inner-gradient)"
                    />
                    <g id="celeste-eye-reflection" fill="white">
                        <circle
                            id="celeste-eye-reflection-large"
                            cx="22" cy="17"
                            r="5"
                        />
                        <circle
                            id="celeste-eye-reflection-small"
                            cx="17" cy="25"
                            r="2"
                        />
                    </g>
                </symbol>
                <g id="celeste-eye-right">
                    <path
                        id="celeste-eye-right-sclera"
                        d="M 230 288 C 218 265 199 290 200 295 C 200 302 202 308 207 313 C 211 316 220 318 225 314 Z"
                        fill="#e9e9e9"
                    />
                    <path
                        id="celeste-eye-right-lash"
                        d="M 232 285 C 218 265 199 290 200 295"
                        stroke="#272012" stroke-width="3" stroke-linecap="round"
                        fill="none"
                    />
                    <use href="#celeste-eye" x="203" y="273" />
                </g>
                <g id="celeste-eye-left">
                    <path
                        id="celeste-eye-left-sclera"
                        d="M 265 288 C 277 265 296 290 295 295 C 295 302 293 308 288 313 C 284 316 275 318 270 314 Z"
                        fill="#e9e9e9"
                    />
                    <path
                        id="celeste-eye-left-lash"
                        d="M 263 285 C 277 265 296 290 295 295"
                        stroke="#272012" stroke-width="3" stroke-linecap="round"
                        fill="none"
                    />
                    <use href="#celeste-eye" x="259" y="273" />
                </g>
            </g>
        </g>
        <path
            id="orange-wave"
            d="M 0 322 C 26 286 133 263 228 312 C 413 408 477 280 512 300 V 512 H 0 Z"
            fill="#feaa61"
            filter="url(#orange-wave-shadow)"
        />
    </g>
</svg>
