<ul>
  {% for pronum in pronums %}
  <li id="pronum-{{ pronum.id }}">
    {# A custom date format is used as <time> only accepts three-digit decimals #}
    <b><time datetime="{{ pronum.date|date:'Y-m-d\\TH:i:sO' }}">{{ pronum.date }}</time>:</b>
    {{ pronum.get_formatted_html|safe }}
  </li>
  {% endfor %}
</ul>
